<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <!-- Background -->
  <rect width="500" height="400" rx="20" fill="#1a2a3a"/>
  
  <!-- Circuit lines -->
  <path d="M50 100 L150 100 L150 150 L200 150" stroke="#00979D" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M300 100 L350 100 L350 150 L400 150" stroke="#00979D" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M100 250 L100 300 L150 300" stroke="#00979D" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M350 250 L350 300 L400 300" stroke="#00979D" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M150 200 L200 200 L200 250 L250 250" stroke="#00979D" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M250 250 L300 250 L300 200 L350 200" stroke="#00979D" stroke-width="2" fill="none" opacity="0.6"/>
  
  <!-- Central chip (ESP32) -->
  <rect x="200" y="140" width="100" height="80" rx="8" fill="#2C3E50" stroke="#00979D" stroke-width="2"/>
  <text x="250" y="170" text-anchor="middle" fill="#00979D" font-family="monospace" font-size="14" font-weight="bold">ESP32</text>
  <text x="250" y="190" text-anchor="middle" fill="#6C7A89" font-family="monospace" font-size="10">IoT</text>
  <!-- Pins -->
  <rect x="195" y="155" width="5" height="10" fill="#00979D" opacity="0.5"/>
  <rect x="195" y="175" width="5" height="10" fill="#00979D" opacity="0.5"/>
  <rect x="195" y="195" width="5" height="10" fill="#00979D" opacity="0.5"/>
  <rect x="300" y="155" width="5" height="10" fill="#00979D" opacity="0.5"/>
  <rect x="300" y="175" width="5" height="10" fill="#00979D" opacity="0.5"/>
  <rect x="300" y="195" width="5" height="10" fill="#00979D" opacity="0.5"/>
  
  <!-- Antenna waves -->
  <path d="M160 120 Q130 100 160 80" stroke="#00979D" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M150 130 Q110 100 150 70" stroke="#00979D" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M140 140 Q90 100 140 60" stroke="#00979D" stroke-width="2" fill="none" opacity="0.2"/>
  
  <!-- Cloud icon -->
  <ellipse cx="120" cy="80" rx="30" ry="20" fill="#2C3E50" stroke="#00979D" stroke-width="2" opacity="0.8"/>
  <ellipse cx="110" cy="75" rx="20" ry="15" fill="#3D5A73" opacity="0.5"/>
  <text x="120" y="84" text-anchor="middle" fill="#00979D" font-family="monospace" font-size="10">CLOUD</text>
  
  <!-- Lightning bolt -->
  <polygon points="370,130 365,150 375,145 370,160" fill="#FFD700" opacity="0.8"/>
  
  <!-- Data dots -->
  <circle cx="180" cy="100" r="4" fill="#00979D" opacity="0.5"/>
  <circle cx="320" cy="100" r="4" fill="#00979D" opacity="0.5"/>
  <circle cx="250" cy="80" r="4" fill="#00979D" opacity="0.5"/>
  
  <!-- Mobile/tablet icon -->
  <rect x="380" y="250" width="40" height="60" rx="4" fill="#2C3E50" stroke="#00979D" stroke-width="1.5" opacity="0.8"/>
  <circle cx="400" cy="302" r="3" fill="#00979D" opacity="0.5"/>
  
  <!-- Sensor dots -->
  <circle cx="100" cy="320" r="6" fill="#2C3E50" stroke="#00979D" stroke-width="1.5" opacity="0.7"/>
  <circle cx="400" cy="340" r="6" fill="#2C3E50" stroke="#00979D" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Connection lines between elements -->
  <line x1="150" y1="140" x2="200" y2="160" stroke="#00979D" stroke-width="1" opacity="0.3"/>
  <line x1="300" y1="180" x2="380" y2="260" stroke="#00979D" stroke-width="1" opacity="0.3"/>
  <line x1="120" y1="100" x2="200" y2="180" stroke="#00979D" stroke-width="1" opacity="0.3"/>
  
  <!-- Bottom text -->
  <text x="250" y="380" text-anchor="middle" fill="#6C7A89" font-family="sans-serif" font-size="14" opacity="0.6">Systèmes Embarqués & IoT</text>
</svg>
